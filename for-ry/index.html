<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>here are some cats</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: url('background.png') no-repeat center center fixed;
            background-size: cover;
        }
        .container {
            text-align: center;
            color: #FFFFFF;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
        }
        .question {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .options {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .option {
            margin: 0 10px;
            font-size: 1.2em;
        }
        .option input {
            margin-right: 10px;
        }
        .submit-button {
            padding: 10px 20px;
            font-size: 1.2em;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .submit-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="question">Roses are red</div>
        <div class="question">Violets are blue</div>
        <div class="question">I would really love</div>
        <div class="question">To go out with you</div>
        <div class="options">
            <label class="option">
                <input type="checkbox"> Yes
            </label>
            <label class="option">
                <input type="checkbox"> No
            </label>
        </div>
        <button class="submit-button">Submit</button>
    </div>
</body>
</html>
